openapi: 3.0.0
info:
  title: Expenses Tracker
  version: 0.0.1
security:
    - FirebaseAuth: []
paths:
  /transactions:
    get:
      summary: Get transactions
      description: Retrieve a list of paginated transactions, with the latest transactions first.
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
          description: The offset of the first transaction to retrieve.
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: The maximum number of transactions to retrieve.
        - in: query
          name: search
          schema:
            type: string
          description: Only return transactions whose text contains this (case-insensitive).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      summary: Create a transaction
      description: Create a new transaction.
      requestBody:
        description: Transaction object to be created
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransaction"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
  /transactions/{id}/link:
    patch:
      summary: Link or unlink a transaction
      description: >-
        Set or clear the transaction that this transaction is a reimbursement/refund for.
        Pass a null linkedTransactionId to unlink.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        description: The transaction to link to, or null to unlink.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkTransaction"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad request, e.g. attempting to link a transaction to itself.
        "404":
          description: The linkedTransactionId does not refer to an existing transaction owned by the user.
  /transactions/{id}/reimbursements:
    get:
      summary: Get reimbursements for a transaction
      description: Retrieve all transactions that are linked to (i.e. reimburse/refund) the given transaction.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
  /statistics:
    get:
      summary: Get statistics overview
      description: >-
        Retrieve an overview of the user's cash flow: average monthly cash flow, a per-category
        breakdown of average monthly cash flow, and monthly cash flow totals per category
        (zero-filled for months/categories without activity).
      parameters:
        - in: query
          name: startDate
          schema:
            type: string
            format: date
          description: >-
            The start of the period to compute statistics over (inclusive). Defaults to 1 year
            before today if omitted.
        - in: query
          name: endDate
          schema:
            type: string
            format: date
          description: The end of the period to compute statistics over (inclusive). Defaults to today if omitted.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticsOverview"
        "400":
          description: Bad request, e.g. startDate or endDate is not a valid date.
  /accounts:
    get:
      summary: Get accounts
      description: Retrieve a list of accounts.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
  /categories:
    get:
      summary: Get categories
      description: Retrieve a list of categories.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
components:
  securitySchemes:
    FirebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Account:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true

    Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
    Transaction:
      type: object
      readOnly: true
      required:
        - id
        - date
        - text
        - amount
        - account
        - category
        - fixedCost
      properties:
        id:
          type: string
        date:
          type: string
          format: date-time
          description: The date of the transaction. This is not necessarily the date that the purchase was made.
        text:
          type: string
          description: The text of the transaction. Should be the same as the text on the bank statement.
        amount:
          type: number
          description: The amount of the transaction. Negative values indicate an expense, positive values indicate income.
        account:
          $ref: "#/components/schemas/Account"
          description: The identifier of the account associated with the transaction.
        category:
          $ref: "#/components/schemas/Category"
          description: The identifier of the category associated with the transaction.
        fixedCost:
          type: boolean
          description: Indicates whether the transaction is a fixed cost.
        description:
          type: string
          nullable: true
          description: Additional description of the transaction.
        linkedTransactionId:
          type: string
          nullable: true
          description: The identifier of the original transaction that this transaction is a reimbursement/refund for, if any.
    CreateTransaction:
      type: object
      required:
        - date
        - text
        - amount
        - accountId
        - categoryId
        - fixedCost
      properties:
        date:
          type: string
          format: date-time
          description: The date of the transaction. This is not necessarily the date that the purchase was made.
        text:
          type: string
          description: The text of the transaction. Should be the same as the text on the bank statement.
        amount:
          type: number
          description: The amount of the transaction. Negative values indicate an expense, positive values indicate income.
        accountId:
          type: string
          description: The identifier of a preexisting account that the transaction was made from / to.
        categoryId:
          type: string
          description: The identifier of a preexisting category that the transaction belongs to.
        fixedCost:
          type: boolean
        description:
          type: string
          nullable: true
        linkedTransactionId:
          type: string
          nullable: true
          description: The identifier of a preexisting transaction that this transaction is a reimbursement/refund for.
    LinkTransaction:
      type: object
      properties:
        linkedTransactionId:
          type: string
          nullable: true
          description: The identifier of the transaction to link to, or null to unlink.
    StatisticsOverview:
      type: object
      readOnly: true
      required:
        - yearMonthlyAverage
        - previousYearMonthlyAverage
        - monthlyCategoryTotals
        - categoryAverage
      properties:
        yearMonthlyAverage:
          $ref: "#/components/schemas/YearMonthlyAverage"
          description: The average monthly fixed/variable cash flow for the requested period.
        previousYearMonthlyAverage:
          $ref: "#/components/schemas/YearMonthlyAverage"
          description: >-
            The average monthly fixed/variable cash flow for the period of the same length
            immediately preceding the requested period, used to show a trend.
        monthlyCategoryTotals:
          type: array
          description: Monthly cash flow totals per category, from startDate onwards.
          items:
            $ref: "#/components/schemas/MonthlyCategoryTotals"
        categoryAverage:
          type: object
          description: A map of category id to average monthly cash flow for that category, for the requested period.
          additionalProperties:
            type: number
    YearMonthlyAverage:
      type: object
      required:
        - averageFixedCost
        - averageVariableCost
      properties:
        averageFixedCost:
          type: number
          description: The average monthly cash flow from fixed-cost transactions.
        averageVariableCost:
          type: number
          description: The average monthly cash flow from non-fixed-cost transactions.
    MonthlyCategoryTotals:
      type: object
      required:
        - month
        - categoryId
        - negativeAmount
        - positiveAmount
        - totalAmount
      properties:
        month:
          type: string
          format: date-time
          description: The month the totals are for. The day and time should be ignored.
        categoryId:
          type: string
        negativeAmount:
          type: number
          description: The sum of negative (expense) transaction amounts for this category and month.
        positiveAmount:
          type: number
          description: The sum of positive (income) transaction amounts for this category and month.
        totalAmount:
          type: number
          description: The sum of all transaction amounts for this category and month.
